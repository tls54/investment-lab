services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investment-lab-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://frontend
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - investment-lab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: investment-lab-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - investment-lab-network

networks:
  investment-lab-network:
    driver: bridge
